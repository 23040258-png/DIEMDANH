<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Điểm Danh & Lớp Học</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome cho Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        // Bảng màu Education Theme
                        edu: {
                            dark: '#1e3a8a',    // Xanh Navy đậm (chủ đạo)
                            light: '#eff6ff',   // Xanh nhạt (nền)
                            accent: '#f59e0b',  // Cam sáng (nhấn)
                            text: '#334155',    // Xám đậm cho chữ
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS tuỳ chỉnh cho hiệu ứng */
        body {
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .input-group {
            position: relative;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            transform: translateY(-2px);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 0.75rem;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            color: #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .input-field:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1), 0 2px 4px -1px rgba(59, 130, 246, 0.06);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .input-group:focus-within .input-icon {
            color: #3b82f6;
        }

        /* Hiệu ứng nút Submit */
        .btn-submit {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Glassmorphism Header */
        .glass-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <!-- Container chính -->
    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.1)] overflow-hidden animate-slide-up border border-white/50 relative">
        
        <!-- Background trang trí mờ -->
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-blue-500 opacity-10 blur-3xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-edu-accent opacity-10 blur-3xl pointer-events-none"></div>

        <!-- Header -->
        <div class="glass-header text-white p-8 sm:p-10 text-center relative z-10">
            <div class="inline-block p-4 bg-white/10 rounded-2xl backdrop-blur-sm mb-4 shadow-inner">
                <i class="fas fa-graduation-cap text-4xl text-edu-light"></i>
            </div>
            <h1 class="text-3xl sm:text-4xl font-bold tracking-tight mb-2">Quản Lý Điểm Danh</h1>
            <p class="text-blue-100/90 font-medium tracking-wide">Hệ thống đồng bộ dữ liệu Google Sheets</p>
        </div>

        <!-- Form Section -->
        <div class="p-8 sm:p-10 relative z-10">
            <form id="attendanceForm" class="space-y-6">
                
                <!-- Hàng 1: Lớp & Học Sinh -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Lớp Học</label>
                        <div class="relative">
                            <i class="fas fa-chalkboard input-icon"></i>
                            <select name="className" required class="input-field appearance-none cursor-pointer">
                                <option value="" disabled selected>-- Chọn lớp --</option>
                                <option value="IELTS">Khóa IELTS</option>
                                <option value="ĐĂNG">Lớp ĐĂNG</option>
                                <option value="TÂM">Lớp TÂM</option>
                                <option value="TA 9 - OFF">TA 9 - Offline</option>
                                <option value="TA 9 - ONL">TA 9 - Online</option>
                                <option value="TA 12">Tiếng Anh 12</option>
                                <option value="TUẤN">Lớp TUẤN</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fas fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Họ và Tên</label>
                        <div class="relative">
                            <i class="fas fa-user-graduate input-icon"></i>
                            <input type="text" name="studentName" required placeholder="Nhập tên học viên..." class="input-field">
                        </div>
                    </div>
                </div>

                <!-- Hàng 2: Ngày & Học phí -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Ngày Học</label>
                        <div class="relative">
                            <i class="fas fa-calendar-alt input-icon z-10"></i>
                            <!-- Note: input[type="date"] có padding trái riêng để chừa chỗ cho icon -->
                            <input type="date" name="date" required id="datePicker" class="input-field pl-10 cursor-pointer">
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Học Phí (VNĐ)</label>
                        <div class="relative">
                            <i class="fas fa-money-bill-wave input-icon"></i>
                            <input type="number" name="fee" placeholder="VD: 150000" class="input-field">
                        </div>
                    </div>
                </div>

                <!-- Hàng 3: Nội dung & Tên bài -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Kỹ Năng / Phân Môn</label>
                        <div class="relative">
                            <i class="fas fa-book-open input-icon"></i>
                            <input type="text" name="content" required placeholder="VD: READING, LISTENING..." class="input-field">
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Tên Bài Học</label>
                        <div class="relative">
                            <i class="fas fa-bookmark input-icon"></i>
                            <input type="text" name="lesson" required placeholder="VD: MULTIPLE CHOICE..." class="input-field">
                        </div>
                    </div>
                </div>

                <!-- Nhận xét -->
                <div class="input-group">
                    <label class="block text-sm font-semibold text-edu-text mb-2 ml-1">Đánh Giá & Nhận Xét</label>
                    <div class="relative">
                        <i class="fas fa-comment-dots absolute left-4 top-3 text-gray-400 transition-colors duration-300"></i>
                        <textarea name="remarks" rows="3" placeholder="Ghi chú về thái độ, bài tập về nhà..." class="input-field !pl-10 resize-none"></textarea>
                    </div>
                </div>

                <!-- Nút Submit -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="btn-submit w-full bg-edu-dark text-white font-bold text-lg py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-3">
                        <i class="fas fa-cloud-upload-alt text-xl" id="btnIcon"></i>
                        <span id="btnText">Lưu Dữ Liệu</span>
                        <i id="btnSpinner" class="fas fa-circle-notch fa-spin hidden text-xl"></i>
                    </button>
                </div>

                <!-- Thông báo -->
                <div id="alertMessage" class="hidden p-4 rounded-xl mt-4 text-center font-medium animate-fade-in border flex items-center justify-center gap-2"></div>
            </form>
        </div>
    </div>

    <script>
        // Set mặc định ngày hôm nay
        document.getElementById('datePicker').valueAsDate = new Date();

        // XỬ LÝ GỬI DỮ LIỆU
        const form = document.getElementById('attendanceForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const btnSpinner = document.getElementById('btnSpinner');
        const alertMessage = document.getElementById('alertMessage');

        // Link API của bạn
        const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyZrWctJwl83EvKGY3lWdqhwh9j_Kov6ddold2sGynVNHXRz-OzQvT35XFddPdJDR-/exec'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // UI Trạng thái đang tải
            btnText.innerText = 'Đang đồng bộ...';
            btnIcon.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-edu-dark', 'bg-blue-400');
            submitBtn.classList.add('cursor-not-allowed');
            alertMessage.classList.add('hidden');

            const data = new FormData(form);

            fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                body: data
            })
            .then(res => res.json())
            .then(data => {
                if(data.result === 'success') {
                    showAlert('<i class="fas fa-check-circle"></i> Điểm danh thành công!', 'success');
                    form.reset();
                    document.getElementById('datePicker').valueAsDate = new Date(); 
                } else {
                    showAlert('<i class="fas fa-exclamation-circle"></i> Lỗi: ' + data.message, 'error');
                }
            })
            .catch(error => {
                showAlert('<i class="fas fa-wifi"></i> Lỗi kết nối. Vui lòng kiểm tra mạng!', 'error');
                console.error('Error!', error.message);
            })
            .finally(() => {
                // Khôi phục UI nút bấm
                btnText.innerText = 'Lưu Dữ Liệu';
                btnIcon.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-blue-400', 'bg-edu-dark');
                submitBtn.classList.remove('cursor-not-allowed');
            });
        });

        function showAlert(message, type) {
            alertMessage.innerHTML = message;
            // Xóa các class cũ
            alertMessage.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');
            
            // Thêm class mới tùy theo trạng thái
            if (type === 'success') {
                alertMessage.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            } else {
                alertMessage.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }
            
            // Tự động ẩn thông báo thành công sau 5 giây
            if(type === 'success') {
                setTimeout(() => {
                    alertMessage.classList.add('hidden');
                }, 5000);
            }
        }
    </script>
</body>
</html>
